name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 直接用官方在 Docker Hub 上已经构建好的 kivy/buildozer 镜像，
      # 不走 ArtemSBulgakov/buildozer-action 自带的、经常构建失败的 Dockerfile。
      - name: Build APK with official Buildozer image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mycgc-apk
          path: bin/*.apk

